<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامج المؤتمر الدولي الثالث</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a4731;
  font-family: 'Tajawal', sans-serif;
  color: #fff;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  direction: rtl;
}
.topbar {
  position: fixed; top:0; right:0; left:0; height:52px;
  background: rgba(8,24,16,.96);
  border-bottom: 1px solid rgba(74,173,114,.3);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 100;
}
.topbar-title { font-size:13px; font-weight:700; color:rgba(255,255,255,.85); }
.counter { font-size:13px; color:rgba(255,255,255,.5); display:flex; align-items:center; gap:6px; }
.counter b { color:#4aad72; font-size:16px; font-weight:800; }
.stage {
  position: fixed; inset: 52px 0 56px 0;
  display: flex; align-items: center; justify-content: center;
}
.frame-wrap {
  width: calc(100% - 120px); max-width: 1100px;
  aspect-ratio: 1849/1245; max-height:100%;
  border-radius:8px; overflow:hidden;
  box-shadow: 0 25px 70px rgba(0,0,0,.6);
  position: relative; cursor: pointer;
  background: #1a4731;
}
.slide {
  position: absolute; inset:0; width:100%; height:100%;
  object-fit: contain; pointer-events: none; display: none;
}
.slide.active { display:block; }
#chess-canvas {
  position: absolute; inset:0; width:100%; height:100%;
  pointer-events: none; z-index: 5; display: none;
}
.nav {
  position: fixed; top:50%; transform:translateY(-50%);
  width:46px; height:46px; border-radius:50%;
  background: rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; z-index:10;
}
.nav:hover { background: rgba(45,138,87,.6); transform:translateY(-50%) scale(1.1); }
.nav svg { width:22px; height:22px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
#btn-prev { right:16px; }
#btn-next { left:16px; }
.fsb {
  position:fixed; bottom:64px; left:14px;
  width:32px; height:32px; border-radius:6px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; z-index:10;
}
.fsb:hover { background:rgba(45,138,87,.45); }
.fsb svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:1.8; stroke-linecap:round; }
.dots-bar {
  position:fixed; bottom:0; right:0; left:0; height:56px;
  background: rgba(8,24,16,.96);
  border-top: 1px solid rgba(74,173,114,.2);
  display:flex; align-items:center; justify-content:center;
  gap:7px; z-index:100; padding: 0 60px; overflow: hidden;
}
.dot {
  width:8px; height:8px; border-radius:50%;
  background: rgba(255,255,255,.25);
  cursor:pointer; transition:.25s; flex-shrink:0;
}
.dot:hover { background: rgba(74,173,114,.7); transform:scale(1.3); }
.dot.on { background: #4aad72; width:24px; border-radius:4px; }
.hint {
  position:fixed; bottom:64px; left:50%; transform:translateX(-50%);
  font-size:11px; color:rgba(255,255,255,.3); pointer-events:none;
  transition:opacity 1s; z-index:5; white-space:nowrap;
}
.hint.gone { opacity:0; }

/* ── Mobile ── */
@media (max-width: 600px) {
  .frame-wrap {
    width: 100% !important;
    border-radius: 0;
    box-shadow: none;
  }
  .stage {
    inset: 44px 0 50px 0;
  }
  .topbar { height: 44px; padding: 0 12px; }
  .topbar-title { font-size: 11px; }
  .counter { font-size: 11px; }
  .counter b { font-size: 13px; }
  .dots-bar { height: 50px; padding: 0 8px; gap: 5px; }
  .dot { width: 6px; height: 6px; }
  .dot.on { width: 18px; }
  .nav { width: 38px; height: 38px; }
  .nav svg { width: 18px; height: 18px; }
  #btn-prev { right: 6px; }
  #btn-next { left: 6px; }
  .fsb { bottom: 58px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">المعلم والتعليم في عصر الذكاء الاصطناعي</div>
  <div class="counter">
    <b id="cur">1</b>
    <span style="color:rgba(255,255,255,.3)">من</span>
    <b>34</b>
  </div>
</div>

<div class="stage" id="stage">
  <div class="frame-wrap" id="frame">
    <canvas id="chess-canvas"></canvas>
  </div>
</div>

<button class="nav" id="btn-prev" title="السابق">
  <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
</button>
<button class="nav" id="btn-next" title="التالي">
  <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
</button>

<button class="fsb" id="fsb" title="ملء الشاشة">
  <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
</button>

<div class="hint" id="hint">← → للتنقل &nbsp;·&nbsp; مسافة للتشغيل التلقائي &nbsp;·&nbsp; F لملء الشاشة</div>
<div class="dots-bar" id="dots-bar"></div>

<script>
const IMAGES = [
  "slides/1.png",
  "slides/2.png",
  "slides/3.png",
  "slides/4.png",
  "slides/5.png",
  "slides/6.png",
  "slides/7.png",
  "slides/8.png",
  "slides/9.png",
  "slides/10.png",
  "slides/11.png",
  "slides/12.png",
  "slides/13.png",
  "slides/14.png",
  "slides/15.png",
  "slides/16.png",
  "slides/17.png",
  "slides/18.png",
  "slides/19.png",
  "slides/20.png",
  "slides/21.png",
  "slides/22.png",
  "slides/23.png",
  "slides/24.png",
  "slides/25.png",
  "slides/26.png",
  "slides/27.png",
  "slides/28.png",
  "slides/29.png",
  "slides/30.png",
  "slides/31.png",
  "slides/32.png",
  "slides/33.png",
  "slides/34.png"
];

let cur = 0, autoT = null, transitioning = false;
const frame   = document.getElementById('frame');
const dotsBar = document.getElementById('dots-bar');
const canvas  = document.getElementById('chess-canvas');
const ctx     = canvas.getContext('2d');
const slides  = [], dots = [];

const imgObjs = IMAGES.map(src => {
  const im = new Image();
  im.src = src;
  return im;
});

for (let i = 0; i < IMAGES.length; i++) {
  const img = document.createElement('img');
  img.className = 'slide' + (i===0 ? ' active' : '');
  img.src = IMAGES[i];
  frame.insertBefore(img, canvas);
  slides.push(img);

  const d = document.createElement('div');
  d.className = 'dot' + (i===0 ? ' on' : '');
  d.onclick = () => go(i);
  dotsBar.appendChild(d);
  dots.push(d);
}

// ── Helper: draw image contained ──
function drawImg(im, alpha) {
  const fw = canvas.width, fh = canvas.height;
  ctx.save();
  ctx.globalAlpha = alpha;
  const iw = im.naturalWidth  || fw;
  const ih = im.naturalHeight || fh;
  const scale = Math.min(fw/iw, fh/ih);
  const dw = iw*scale, dh = ih*scale;
  ctx.drawImage(im, (fw-dw)/2, (fh-dh)/2, dw, dh);
  ctx.restore();
}

// ── Zoom-from-center transition ──
// New slide zooms in from small → full while old slide fades out
function chessTransition(fromIdx, toIdx, onDone) {
  const fw = frame.offsetWidth;
  const fh = frame.offsetHeight;
  canvas.width  = fw;
  canvas.height = fh;
  canvas.style.display = 'block';

  const fromImg = imgObjs[fromIdx];
  const toImg   = imgObjs[toIdx];

  const DURATION = 1000; // ms

  const N = 8;
  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  let startTime = null;

  function animate(ts) {
    if (!startTime) startTime = ts;
    const t = Math.min(1, (ts - startTime) / DURATION);

    ctx.clearRect(0, 0, fw, fh);

    for (let i = 0; i < N; i++) {
      const delay = i / N * 0.4;
      const lt = Math.min(1, Math.max(0, (t - delay) / (1 - delay)));
      const p = easeOut(lt);
      const sh = fh / N;
      const dir = i % 2 === 0 ? 1 : -1;

      ctx.save();
      ctx.beginPath();
      ctx.rect(0, i * sh, fw, sh);
      ctx.clip();
      ctx.drawImage(fromImg, -dir * fw * p, 0, fw, fh);
      ctx.drawImage(toImg,    dir * fw * (1 - p), 0, fw, fh);
      ctx.restore();
    }

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      canvas.style.display = 'none';
      onDone();
    }
  }

  requestAnimationFrame(animate);
}
// ── Zoom on double-click ──
let zoomed = false;

frame.addEventListener('dblclick', () => {
  if (transitioning) return;
  zoomed = !zoomed;
  const img = slides[cur];
  if (zoomed) {
    img.style.transform  = 'scale(2)';
    img.style.transition = 'transform 0.4s ease';
    img.style.cursor     = 'zoom-out';
    frame.style.overflow = 'hidden';
    frame.style.cursor   = 'zoom-out';
  } else {
    img.style.transform  = 'scale(1)';
    img.style.transition = 'transform 0.4s ease';
    img.style.cursor     = '';
    frame.style.overflow = 'hidden';
    frame.style.cursor   = 'default';
  }
});

function resetZoom() {
  if (!zoomed) return;
  zoomed = false;
  slides.forEach(s => {
    s.style.transform = 'scale(1)';
    s.style.transition = 'transform 0.3s ease';
    s.style.cursor = '';
  });
  frame.style.overflow = 'hidden';
  frame.style.cursor = 'default';
}

// ── Navigation ──
function go(idx) {
  if (transitioning) return;
  if (idx === cur) return;
  if (idx < 0) idx = IMAGES.length - 1;
  if (idx >= IMAGES.length) idx = 0;

  resetZoom();
  transitioning = true;
  const fromIdx = cur;
  dots[cur].classList.remove('on');
  cur = idx;
  dots[cur].classList.add('on');
  document.getElementById('cur').textContent = cur + 1;
  dots[cur].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  document.getElementById('hint').classList.add('gone');

  chessTransition(fromIdx, idx, () => {
    slides[fromIdx].classList.remove('active');
    slides[idx].classList.add('active');
    transitioning = false;
  });
}

document.getElementById('btn-prev').onclick = () => go(cur - 1);
document.getElementById('btn-next').onclick = () => go(cur + 1);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(cur - 1);
  else if (e.key === 'ArrowLeft')  go(cur + 1);
  else if (e.key === ' ') {
    e.preventDefault();
    if (autoT) { clearInterval(autoT); autoT = null; }
    else autoT = setInterval(() => go(cur + 1), 4000);
  }
  else if (e.key === 'f' || e.key === 'F') toggleFS();
});

let tx = 0, isPinch = false;
document.getElementById('stage').addEventListener('touchstart', e => {
  if (e.touches.length > 1) { isPinch = true; return; }
  isPinch = false;
  tx = e.touches[0].clientX;
}, {passive:true});
document.getElementById('stage').addEventListener('touchmove', e => {
  if (e.touches.length > 1) isPinch = true;
}, {passive:true});
document.getElementById('stage').addEventListener('touchend', e => {
  // still fingers on screen or was a pinch → ignore
  if (isPinch || e.touches.length > 0) { 
    if (e.touches.length === 0) isPinch = false;
    return; 
  }
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(dx > 0 ? cur - 1 : cur + 1);
}, {passive:true});

function toggleFS() {
  document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
}
document.getElementById('fsb').onclick = toggleFS;
setTimeout(() => document.getElementById('hint').classList.add('gone'), 5000);
</script>
</body>
</html>
